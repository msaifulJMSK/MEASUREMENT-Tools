<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGINEERING MEASUREMENT TOOLKIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet">

    <!-- ======================================================== -->
    <!-- KOD KHAS UNTUK THUMBNAIL (OPEN GRAPH META TAGS)        -->
    <!-- ======================================================== -->
    <meta property="og:title" content="ENGINEERING MEASUREMENT TOOLKIT" />
    <meta property="og:description" content="Choose your measurement tool." />
    <meta property="og:url" content="https://msaifuljmsk.github.io/MEASUREMENT-Tools/" />
    <meta property="og:type" content="website" />
    <!-- Baris di bawah ini telah ditukar untuk memanggil fail toos.png anda -->
    <meta property="og:image" content="https://msaifuljmsk.github.io/MEASUREMENT-Tools/tools(1).png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <!-- ======================================================== -->

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f1f4f8; 
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 40px;
            text-align: center;
        }

        .header {
            margin-bottom: 60px;
        }

        .main-title {
            color: #2c3e50;
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: capitalize;
        }

        .main-subtitle {
            color: #7f8c8d;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .card-group {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tool-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            width: 320px;
            height: 450px; 
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            border-bottom: 4px solid transparent;
        }

        .tool-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .tool-card--vernier {
            border-bottom-color: #3498db;
        }

        .tool-card--micrometer {
            border-bottom-color: #9b59b6;
        }

        .card-icon {
            width: 160px;
            height: 160px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card-icon img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-title {
            color: #2c3e50;
            font-size: 1.6rem;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .card-text {
            color: #7f8c8d;
            font-size: 1rem;
            line-height: 1.5;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 class="main-title">ENGINEERING MEASUREMENT TOOLKIT</h1>
            <p class="main-subtitle">Choose your measurement tool.</p>
        </div>

        <div class="card-group">
            <!-- Card 1: Vernier Caliper -->
            <a href="VernierCaliper-calculator.html" class="tool-card tool-card--vernier">
                <div class="card-icon">
                    <img src="verniercaliper.png" alt="Vernier Caliper">
                </div>
                <h3 class="card-title">Vernier Caliper</h3>
                <p class="card-text">A measuring tool used for measuring linear dimensions:measures thickness,diameter and depth of an object.</p>
            </a>

            <!-- Card 2: Micrometer Screw Gauge -->
            <a href="MicrometerScrewGauge-calculator.html" class="tool-card tool-card--micrometer">
                <div class="card-icon">
                    <img src="micrometer.png" alt="Micrometer Screw Gauge">
                </div>
                <h3 class="card-title">Micrometer Screw Gauge</h3>
                <p class="card-text">A measuring instrument that used to measure small lengths with greater accuracy.</p>
            </a>
        </div>
    </div>

</body>
</html>
